name: llm-homelab-training

services:
    trainer:
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: llm-homelab-trainer
        user: "${USERMAP_UID:-1000}:${USERMAP_GID:-1000}"
        working_dir: /workspace
        stdin_open: true
        tty: true
        environment:
            NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
            CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
            NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
            HF_HOME: ${HF_HOME:-/workspace/.cache/huggingface}
            HF_DATASETS_CACHE: ${HF_DATASETS_CACHE:-/workspace/.cache/huggingface/datasets}
            TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/workspace/.cache/huggingface/transformers}
            PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-max_split_size_mb:128}"
        volumes:
            - ../src:/workspace/src
            - ../configs:/workspace/configs
            - ../data:/workspace/data
            - ../.cache:/workspace/.cache
            - "/mnt/qnap/Obsidian_Vaults/Work/0 Seeds/15 Dokumentation:/vault/15_Dokumentation:ro"
            # Optional: ExactExtraction samples vault (C1 prepare-dataset-exact target).
            # Host path must exist; if absent Docker Compose will create an empty bind-mount directory.
            - "/mnt/qnap/Obsidian_Vaults/Work/0 Seeds/10 Projekte/Eigenes_LLM_trainieren/TrainingSamples/ExactExtraction:/vault/exact_extraction:ro"
        gpus: all
        command: ["sleep", "infinity"]
        ports:
            - "${TENSORBOARD_PORT:-6006}:6006"
